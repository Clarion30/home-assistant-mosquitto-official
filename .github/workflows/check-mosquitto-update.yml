name: Check Mosquitto Update

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mosquitto-update
  cancel-in-progress: false

jobs:
  check-update:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Neueste Mosquitto-Version ermitteln
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_MOSQUITTO="$(
            sed -nE \
              's/^FROM eclipse-mosquitto:([0-9]+\.[0-9]+\.[0-9]+)-alpine$/\1/p' \
              mosquitto-official/Dockerfile
          )"

          LATEST_MOSQUITTO="$(
            python3 - <<'PY'
          import json
          import re
          import urllib.request

          url = (
              "https://hub.docker.com/v2/repositories/"
              "library/eclipse-mosquitto/tags?page_size=100"
          )
          versions = set()

          while url:
              request = urllib.request.Request(
                  url,
                  headers={"User-Agent": "mosquitto-community-broker-updater"},
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  data = json.load(response)

              for item in data.get("results", []):
                  name = item.get("name", "")
                  match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)-alpine", name)
                  if match:
                      versions.add(tuple(map(int, match.groups())))

              url = data.get("next")

          if not versions:
              raise SystemExit("Kein Mosquitto-Alpine-Versionstag gefunden")

          print(".".join(map(str, max(versions))))
          PY
          )"

          if [ -z "$CURRENT_MOSQUITTO" ]; then
            echo "Aktuelle Mosquitto-Version konnte nicht gelesen werden."
            exit 1
          fi

          echo "Installiertes Docker-Tag: ${CURRENT_MOSQUITTO}-alpine"
          echo "Neuestes Docker-Tag:     ${LATEST_MOSQUITTO}-alpine"

          echo "current=${CURRENT_MOSQUITTO}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST_MOSQUITTO}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_MOSQUITTO" = "$LATEST_MOSQUITTO" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Neues offizielles Docker-Image prüfen
        if: steps.versions.outputs.changed == 'true'
        env:
          NEW_MOSQUITTO: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail
          docker pull "eclipse-mosquitto:${NEW_MOSQUITTO}-alpine"

      - name: App-Dateien aktualisieren
        if: steps.versions.outputs.changed == 'true'
        id: update
        shell: bash
        env:
          OLD_MOSQUITTO: ${{ steps.versions.outputs.current }}
          NEW_MOSQUITTO: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          APP_CONFIG="mosquitto-official/config.yaml"
          DOCKERFILE="mosquitto-official/Dockerfile"
          CHANGELOG="mosquitto-official/CHANGELOG.md"
          README="mosquitto-official/README.md"
          DOCS="mosquitto-official/DOCS.md"

          CURRENT_APP_VERSION="$(
            sed -nE \
              's/^version:[[:space:]]*"([^"]+)"/\1/p' \
              "$APP_CONFIG"
          )"

          if [ -z "$CURRENT_APP_VERSION" ]; then
            echo "App-Version konnte nicht gelesen werden."
            exit 1
          fi

          IFS=. read -r APP_MAJOR APP_MINOR APP_PATCH \
            <<< "$CURRENT_APP_VERSION"

          NEW_APP_VERSION="${APP_MAJOR}.${APP_MINOR}.$((APP_PATCH + 1))"

          sed -i \
            "s|^FROM eclipse-mosquitto:.*-alpine$|FROM eclipse-mosquitto:${NEW_MOSQUITTO}-alpine|" \
            "$DOCKERFILE"

          sed -i \
            "s|^version:.*$|version: \"${NEW_APP_VERSION}\"|" \
            "$APP_CONFIG"

          sed -i \
            "s/Eclipse Mosquitto ${OLD_MOSQUITTO}/Eclipse Mosquitto ${NEW_MOSQUITTO}/g" \
            "$README" "$DOCS" "$DOCKERFILE"

          TEMPFILE="$(mktemp)"
          {
            echo "# Änderungsprotokoll"
            echo
            echo "## ${NEW_APP_VERSION}"
            echo
            echo "- Eclipse Mosquitto von \`${OLD_MOSQUITTO}\` auf \`${NEW_MOSQUITTO}\` aktualisiert"
            echo "- Docker-Image \`eclipse-mosquitto:${NEW_MOSQUITTO}-alpine\` erfolgreich geprüft"
            echo "- Home-Assistant-App-Version auf \`${NEW_APP_VERSION}\` erhöht"
            echo
            sed '1{/^# Änderungsprotokoll$/d;}' "$CHANGELOG" |
              sed '1{/^$/d;}'
          } > "$TEMPFILE"

          mv "$TEMPFILE" "$CHANGELOG"

          echo "app_version=${NEW_APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Dockerfile prüfen
        if: steps.versions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          docker buildx build \
            --check \
            --build-arg BUILD_VERSION="${{ steps.update.outputs.app_version }}" \
            mosquitto-official

      - name: Test-Image vollständig bauen
        if: steps.versions.outputs.changed == 'true'
        run: |
          set -euo pipefail
          docker build \
            --build-arg BUILD_VERSION="${{ steps.update.outputs.app_version }}" \
            --tag mosquitto-community-broker:test \
            mosquitto-official

      - name: Mosquitto-Version im Test-Image prüfen
        if: steps.versions.outputs.changed == 'true'
        env:
          NEW_MOSQUITTO: ${{ steps.versions.outputs.latest }}
        run: |
          set -euo pipefail

          BUILT_VERSION="$(
            docker run --rm \
              --entrypoint mosquitto \
              mosquitto-community-broker:test \
              -h 2>&1 |
            sed -nE 's/^mosquitto version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' |
            head -n1
          )"

          echo "Erwartete Version: ${NEW_MOSQUITTO}"
          echo "Gebaute Version:   ${BUILT_VERSION}"

          test "$BUILT_VERSION" = "$NEW_MOSQUITTO"

      - name: Änderungen committen und pushen
        if: steps.versions.outputs.changed == 'true'
        env:
          NEW_MOSQUITTO: ${{ steps.versions.outputs.latest }}
          NEW_APP_VERSION: ${{ steps.update.outputs.app_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            mosquitto-official/Dockerfile \
            mosquitto-official/config.yaml \
            mosquitto-official/CHANGELOG.md \
            mosquitto-official/README.md \
            mosquitto-official/DOCS.md

          git commit \
            -m "Mosquitto ${NEW_MOSQUITTO} / App ${NEW_APP_VERSION}"

          git push origin HEAD:main

      - name: Git-Tag und GitHub-Release erstellen
        if: steps.versions.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_MOSQUITTO: ${{ steps.versions.outputs.latest }}
          NEW_APP_VERSION: ${{ steps.update.outputs.app_version }}
        run: |
          set -euo pipefail

          TAG="v${NEW_APP_VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} existiert bereits."
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --verify-tag \
            --title "Mosquitto Community Broker ${NEW_APP_VERSION}" \
            --notes-file - <<RELEASE
          Automatisches Update auf Eclipse Mosquitto ${NEW_MOSQUITTO}.

          Änderungen:

          - Eclipse Mosquitto ${NEW_MOSQUITTO}
          - Docker-Image eclipse-mosquitto:${NEW_MOSQUITTO}-alpine
          - Docker-Image erfolgreich gebaut und geprüft
          - Home-Assistant-App-Version ${NEW_APP_VERSION}
          RELEASE

      - name: Kein Update vorhanden
        if: steps.versions.outputs.changed != 'true'
        run: |
          echo "Es ist keine neue Eclipse-Mosquitto-Version vorhanden."
