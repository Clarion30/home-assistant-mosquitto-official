name: Weekly App Build Test

on:
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mosquitto-official/**"
      - ".github/workflows/weekly-build-test.yml"

permissions:
  contents: read

concurrency:
  group: weekly-app-build-test
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7

      - name: App-Version ermitteln
        id: app
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION="$(
            sed -nE \
              's/^version:[[:space:]]*"([^"]+)"/\1/p' \
              mosquitto-official/config.yaml
          )"

          MOSQUITTO_VERSION="$(
            sed -nE \
              's/^FROM eclipse-mosquitto:([0-9]+\.[0-9]+\.[0-9]+)-alpine$/\1/p' \
              mosquitto-official/Dockerfile
          )"

          test -n "$APP_VERSION"
          test -n "$MOSQUITTO_VERSION"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "mosquitto_version=${MOSQUITTO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Konfigurationsdateien prüfen
        run: |
          set -euo pipefail

          test -s mosquitto-official/config.yaml
          test -s mosquitto-official/Dockerfile
          test -s mosquitto-official/run.sh
          test -s mosquitto-official/README.md
          test -s mosquitto-official/DOCS.md
          test -s mosquitto-official/CHANGELOG.md

          grep -q '^slug: "mosquitto_official"$' \
            mosquitto-official/config.yaml

          grep -q '^arch:' mosquitto-official/config.yaml

          test -x mosquitto-official/run.sh

      - name: Dockerfile prüfen
        run: |
          set -euo pipefail
          docker buildx build \
            --check \
            --build-arg BUILD_VERSION="${{ steps.app.outputs.app_version }}" \
            mosquitto-official

      - name: App-Image bauen
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --build-arg BUILD_VERSION="${{ steps.app.outputs.app_version }}" \
            --tag mosquitto-community-broker:weekly-test \
            mosquitto-official

      - name: Mosquitto-Version prüfen
        run: |
          set -euo pipefail

          BUILT_VERSION="$(
            docker run --rm \
              --entrypoint mosquitto \
              mosquitto-community-broker:weekly-test \
              -h 2>&1 |
            sed -nE 's/^mosquitto version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' |
            head -n1
          )"

          EXPECTED_VERSION="${{ steps.app.outputs.mosquitto_version }}"

          echo "Erwartete Version: ${EXPECTED_VERSION}"
          echo "Gebaute Version:   ${BUILT_VERSION}"

          test "$BUILT_VERSION" = "$EXPECTED_VERSION"
